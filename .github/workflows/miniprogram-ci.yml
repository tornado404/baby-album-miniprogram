# 小程序前端 CI
# 每次 push/PR 涉及 miniprogram/ 时自动构建验证
# 使用 node scripts/build.js 注入编译常量后校验构建结果

name: Miniprogram CI

on:
  push:
    branches: [master, "feat/*"]
    paths:
      - "miniprogram/**"
      - "scripts/**"
      - "package.json"
      - "project.config.json"
  pull_request:
    branches: [master]
    paths:
      - "miniprogram/**"
      - "scripts/**"
      - "package.json"
      - "project.config.json"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            miniprogram/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check (ruff)
        run: echo "Node.js project — no linter configured, skipping"

      - name: Run unit tests
        run: npm run test:unit

      - name: Inject build env (testing)
        run: node scripts/build.js testing

      - name: Verify build config injected
        run: node -e "
          var c = require('./project.config.json');
          var define = c.setting && c.setting.define;
          if (!define || define.DEFAULT_ENV !== '\"testing\"') {
            console.error('ERROR: DEFAULT_ENV not found in project.config.json');
            process.exit(1);
          }
          console.log('✅ DEFAULT_ENV injected correctly:', define.DEFAULT_ENV);
        "

      - name: Restore project.config.json
        run: node scripts/build.js --restore
        if: always()

      - name: Verify restore
        run: |
          git diff --exit-code project.config.json || {
            echo "ERROR: project.config.json was modified by build";
            exit 1;
          }
          echo "✅ project.config.json unchanged after restore"