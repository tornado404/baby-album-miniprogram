upstream baby_api {
    server api:8000;
}

upstream baby_minio {
    # baby-minio 容器名（baby-nginx 同时接入 baby-minio_default 网络才能解析）
    server baby-minio:9000;
}

# ── 默认 server：IP 直连，向后兼容旧调试链路 ──
server {
    listen 80 default_server;
    server_name 101.126.41.146 _;
    client_max_body_size 50M;

    location / {
        proxy_pass http://baby_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://baby_api/health;
    }
}

# ── api.qzjlyouhua.fun → baby-api（Cloudflare Flexible 回源走 80） ──
server {
    listen 80;
    server_name api.qzjlyouhua.fun;
    client_max_body_size 50M;

    location / {
        proxy_pass http://baby_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── oss.qzjlyouhua.fun → baby-minio:9000（S3 兼容接口，给小程序上传/下载用） ──
server {
    listen 80;
    server_name oss.qzjlyouhua.fun;
    # 上传单文件上限留 100M，比业务限制(UPLOAD_MAX_SIZE)略宽
    client_max_body_size 100M;

    # 大文件传输关掉 buffering，避免占用 nginx 临时盘 / 增加延迟
    proxy_buffering off;
    proxy_request_buffering off;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://baby_minio;
        # AWS Sig V4 用 Host 计算签名，必须把客户端用的 Host 透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
