version: "3.3"

services:
  postgres:
    image: postgres:15-alpine
    container_name: baby-postgres
    environment:
      POSTGRES_DB: baby_album
      POSTGRES_USER: app
      POSTGRES_PASSWORD: Cs516@2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d baby_album"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - baby-network

  redis:
    image: redis:7-alpine
    container_name: baby-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - baby-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: baby-api-base:latest
    container_name: baby-api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # 代码卷挂载：修改代码后只需重启容器，无需重新构建镜像
      - ./app:/app/app
    healthcheck:
      test: ["CMD", "python3", "-c", "import http.client, sys; c=http.client.HTTPConnection('localhost',8000); c.request('GET','/health'); sys.exit(0 if c.getresponse().status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - baby-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: baby-api-base:latest
    container_name: baby-celery-worker
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    command: >
      celery -A app.tasks.celery_app:celery_app worker
      --loglevel=info
      --queues=thumbnails,celery
      --concurrency=2
      --without-heartbeat
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - baby-network

  nginx:
    image: nginx:alpine
    container_name: baby-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - baby-network
      # 同时接入 MinIO 容器所在网络，使 nginx 能解析到 baby-minio:9000
      - baby-minio

networks:
  baby-network:
    driver: bridge
  # 由独立 docker-compose-minio.yml 创建（项目名 baby-minio）
  baby-minio:
    external: true
    name: baby-minio_default

volumes:
  pgdata:
  redisdata:
